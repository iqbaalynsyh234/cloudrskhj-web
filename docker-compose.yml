services:
  # Laravel App (PHP 8.3)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudrskhj-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloudrskhj

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cloudrskhj-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: cloud_drive
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: clouduser
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudrskhj

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cloudrskhj-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
    depends_on:
      - db
    networks:
      - cloudrskhj

volumes:
  dbdata:

networks:
  cloudrskhj:
    driver: bridge
